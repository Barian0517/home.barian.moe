    <style>
      body {
        margin: 0;
        overflow-x: hidden;
        background-color: #0b0f17;
        font-family: 'Zen Maru Gothic', sans-serif;
      }
      body.hide-cursor, body.hide-cursor * {
        cursor: none !important;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0b0f17;
      }
      ::-webkit-scrollbar-thumb {
        background: #00bfff;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ff00ff;
      }
      
      /* Moving Scanline Animation */
      @keyframes scanline-move {
        0% { background-position: 0 0; }
        100% { background-position: 0 100vh; }
      }

      /* Subtle Flicker Animation for Glitch Effect */
      @keyframes flicker {
        0% { opacity: 0.3; }
        5% { opacity: 0.2; }
        10% { opacity: 0.4; }
        15% { opacity: 0.3; }
        50% { opacity: 0.3; }
        55% { opacity: 0.25; }
        60% { opacity: 0.3; }
        100% { opacity: 0.3; }
      }

      /* CRT Scanline Effect */
      .scanlines::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        /* Much fainter lines (0.08 opacity) for clarity */
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.08) 50%
        );
        background-size: 100% 4px;
        z-index: 10;
        pointer-events: none;
        /* Apply movement and flicker */
        animation: scanline-move 15s linear infinite, flicker 3s infinite;
      }
      
      body.low-performance .scanlines::before {
        animation: none; /* Disable scanline and flicker animation in low-performance mode */
      }

      /* Markdown Styles */
      .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
        color: #fff;
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        font-weight: bold;
        font-family: 'Rajdhani', sans-serif;
      }
      .markdown-body h1 { font-size: 2em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.3em; }
      .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.3em;  }
      .markdown-body p { margin-bottom: 1em; line-height: 1.6; }
      .markdown-body a { color: #00bfff; text-decoration: none; }
      .markdown-body a:hover { text-decoration: underline; }
      .markdown-body ul, .markdown-body ol { padding-left: 2em; margin-bottom: 1em; }
      .markdown-body li { margin-bottom: 0.5em; }
      .markdown-body code { background: rgba(255,255,255,0.1); padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
      .markdown-body pre { background: rgba(0,0,0,0.5); padding: 1em; border-radius: 5px; overflow-x: auto; margin-bottom: 1em; }
      .markdown-body pre code { background: transparent; padding: 0; }
      .markdown-body blockquote { border-left: 4px solid #00bfff; padding-left: 1em; color: rgba(255,255,255,0.7); margin: 0 0 1em 0; }
      .markdown-body img { max-width: 100%; border-radius: 8px; }
    </style>
